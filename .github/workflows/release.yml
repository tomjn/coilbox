name: release

# Build Coilbox for macOS, Linux, and Windows on a version tag (or manually).
# The pr-downloader sidecars are committed under src-tauri/binaries/ per target
# triple, so tauri-build bundles them automatically — no per-OS fetch needed.
#
# All platforms use the committed sidecars under src-tauri/binaries/ — no per-OS
# fetch or build. macOS is arm64-only by design (Apple Silicon).
#
# KNOWN LIMITATION: the committed macOS binary links Homebrew dylibs (e.g.
# minizip), so the bundled sidecar needs those present at runtime. A portable mac
# release needs a static/self-contained pr-downloader build (or bundling its
# dylibs into the .app) — a future hardening step, not done here.

on:
  push:
    # Plain version tags, e.g. 0.1 or 1.0.1 (no leading "v").
    tags:
      - "[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14 # arm64
          - platform: ubuntu-22.04
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - name: Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: bun install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Coilbox ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
