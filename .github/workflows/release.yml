name: release

# Build Coilbox for macOS, Linux, and Windows on a version tag (or manually).
# All platforms use the committed sidecars under src-tauri/binaries/ per target
# triple — tauri-build bundles them automatically, no per-OS fetch or build.
# macOS is arm64-only by design (Apple Silicon).
#
# KNOWN LIMITATION: the committed macOS binary links Homebrew dylibs (e.g.
# minizip), so the bundled sidecar needs those present at runtime. A portable mac
# release needs a static/self-contained pr-downloader build (or bundling its
# dylibs into the .app) — a future hardening step, not done here.

on:
  push:
    # Plain version tags, e.g. 0.1 or 1.0.1 (no leading "v").
    tags:
      - "[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

# tauri-action creates the draft release and uploads the build artifacts.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # `smcng_platform` selects the SpringMapConvNG release asset; `exe` is the
          # binary suffix on Windows.
          - platform: macos-14 # arm64
            smcng_platform: macos-arm64
            exe: ""
          - platform: ubuntu-22.04
            smcng_platform: linux-x86_64
            exe: ""
          - platform: windows-latest
            smcng_platform: windows-x86_64
            exe: ".exe"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - name: Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # libdevil-dev provides libIL.so.1 / libILU.so.1 so linuxdeploy can
          # resolve and bundle the mapconv sidecars' DevIL deps into the AppImage
          # (the linux SpringMapConvNG build links system DevIL, not bundled libs).
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libdevil-dev

      # The release version comes from the git tag, not hand-maintained in source.
      # In source the bundle version is a 0.0.0 placeholder; on a tag build we
      # write the tag (e.g. 0.1.1) into tauri.conf.json so the artifacts are
      # versioned correctly. (jq is preinstalled on all GitHub runners.)
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          jq --arg v "$GITHUB_REF_NAME" '.version = $v' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
          echo "App version set to $GITHUB_REF_NAME"

      - name: Install dependencies
        run: bun install

      # Fetch the pinned SpringMapConvNG release and extract its binaries + libs/
      # into src-tauri/mapconv/, bundled as a Tauri resource folder. The binaries
      # load image libs (DevIL etc.) via @executable_path/libs, so libs/ must sit
      # beside them — externalBin can't carry a folder. gitignored, not committed.
      - name: Fetch SpringMapConvNG sidecars
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VER="$(tr -d '[:space:]' < scripts/springmapconvng-version.txt)"
          ASSET="SpringMapConvNG-${VER}-${{ matrix.smcng_platform }}.tar.gz"
          EXE="${{ matrix.exe }}"
          rm -rf src-tauri/mapconv smcng_tmp
          mkdir -p src-tauri/mapconv smcng_tmp
          gh release download "$VER" --repo tomjn/SpringMapConvNG --pattern "$ASSET" --dir smcng_tmp
          tar -xzf "smcng_tmp/${ASSET}" -C src-tauri/mapconv
          chmod +x "src-tauri/mapconv/mapcompile${EXE}" "src-tauri/mapconv/mapdecompile${EXE}" || true

      # Unlike pr-downloader/uberstress (committed prebuilts), the unitsync worker
      # is our own workspace crate, so build it here into src-tauri/binaries/ with
      # the target-triple suffix Tauri's externalBin bundling expects. It dlopens
      # libunitsync at runtime (no static link), so the binary is self-contained.
      - name: Build unitsync worker sidecar
        shell: bash
        run: bash scripts/build-unitsync-worker.sh

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the updater artifacts and emits latest.json. Set these repo
          # secrets from `tauri signer generate` (private key + its password);
          # the matching public key lives in tauri.conf.json plugins.updater.pubkey.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Coilbox ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
