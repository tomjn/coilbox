"$schema" = "schemas/schema.json"

[default]
description = "Allows the unitsync plugin's content-scan, minimap, heightmap, thumbnail, game-info, engine-config, archive browse/extract and Lua-console commands."
permissions = [
  "allow-unitsync-scan",
  "allow-unitsync-minimap",
  "allow-unitsync-heightmap",
  "allow-unitsync-thumbnails",
  "allow-unitsync-game-info",
  "allow-unitsync-map-info",
  "allow-unitsync-skirmish-ais",
  "allow-unitsync-engine-config",
  "allow-unitsync-archive-tree",
  "allow-unitsync-archive-file",
  "allow-unitsync-lua-exec",
  "allow-unitsync-archive-extract",
]
