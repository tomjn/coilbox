"$schema" = "schemas/schema.json"

[default]
description = "Allows the unitsync plugin's content-scan, minimap, thumbnail, game-info, engine-config and archive browse/extract commands."
permissions = [
  "allow-unitsync-scan",
  "allow-unitsync-minimap",
  "allow-unitsync-thumbnails",
  "allow-unitsync-game-info",
  "allow-unitsync-engine-config",
  "allow-unitsync-archive-tree",
  "allow-unitsync-archive-file",
  "allow-unitsync-archive-extract",
]
