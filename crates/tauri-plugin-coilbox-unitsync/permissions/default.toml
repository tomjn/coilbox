"$schema" = "schemas/schema.json"

[default]
description = "Allows the unitsync plugin's content-scan, minimap, thumbnail, game-info and engine-config commands."
permissions = [
  "allow-unitsync-scan",
  "allow-unitsync-minimap",
  "allow-unitsync-thumbnails",
  "allow-unitsync-game-info",
  "allow-unitsync-engine-config",
]
