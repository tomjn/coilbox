"$schema" = "schemas/schema.json"

[default]
description = "Allows the mapconv plugin's commands (probe, suggest-sources, compile, decompile, cancel, settings)."
permissions = [
  "allow-mc-probe",
  "allow-mc-suggest-sources",
  "allow-mc-compile",
  "allow-mc-decompile",
  "allow-mc-cancel",
  "allow-mc-settings-load",
  "allow-mc-settings-save",
]
