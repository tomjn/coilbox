"$schema" = "schemas/schema.json"

[default]
description = "Allows the uberstress plugin's commands (scenarios, run, cancel, history, report, config, seed SQL)."
permissions = [
  "allow-us-scenarios",
  "allow-us-run",
  "allow-us-cancel",
  "allow-us-history",
  "allow-us-report",
  "allow-us-config-get",
  "allow-us-config-set",
  "allow-us-seed-sql",
]
