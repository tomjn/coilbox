"$schema" = "schemas/schema.json"

[default]
description = "Allows the downloads plugin's commands (version, rapid browsing, springfiles/BAR listing, downloads)."
permissions = [
  "allow-dl-version",
  "allow-dl-repos",
  "allow-dl-versions",
  "allow-dl-download",
  "allow-dl-springfiles-list",
  "allow-dl-springfiles-engines",
  "allow-dl-bar-maps",
  "allow-dl-download-map",
  "allow-dl-download-file",
  "allow-dl-recoil-engines",
  "allow-dl-download-engine-recoil",
  "allow-dl-download-engine-spring",
]
